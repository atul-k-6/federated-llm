services:
  aggregator:
    image: fedlearn-aggregator
    build: .
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1
      - NOISE_MULTIPLIER=${NOISE_MULTIPLIER:-0.01}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  client_1:
    image: fedlearn-client
    build: .
    command: python -m client.client
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=0
      - NUM_CLIENTS=3
      - AGGREGATOR_URL=http://aggregator:8000
      - NOISE_MULTIPLIER=${NOISE_MULTIPLIER:-0.01}
    volumes:
      - .:/app
      - ./data/client_0:/dataset
      - ./checkpoints:/app/checkpoints
    depends_on:
      - aggregator

  client_2:
    image: fedlearn-client
    build: .
    command: python -m client.client
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=1
      - NUM_CLIENTS=3
      - AGGREGATOR_URL=http://aggregator:8000
      - NOISE_MULTIPLIER=${NOISE_MULTIPLIER:-0.01}
    volumes:
      - .:/app
      - ./data/client_1:/dataset
      - ./checkpoints:/app/checkpoints
    depends_on:
      - aggregator

  client_3:
    image: fedlearn-client
    build: .
    command: python -m client.client
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=2
      - NUM_CLIENTS=3
      - AGGREGATOR_URL=http://aggregator:8000
      - NOISE_MULTIPLIER=${NOISE_MULTIPLIER:-0.01}
    volumes:
      - .:/app
      - ./data/client_2:/dataset
      - ./checkpoints:/app/checkpoints
    depends_on:
      - aggregator

  evaluator:
    image: fedlearn-evaluator
    build: .
    command: python -m evaluator.evaluate
    environment:
      - PYTHONUNBUFFERED=1
      - AGGREGATOR_URL=http://aggregator:8000
      - NOISE_MULTIPLIER=${NOISE_MULTIPLIER:-0.01}
    volumes:
      - .:/app
      - ./data/evaluator:/dataset
    depends_on:
      - aggregator
